<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="100%" height="100%">
  <defs>
    <!-- Chrome / Silver Gradients -->
    <linearGradient id="chrome-grad-1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F252C" />
      <stop offset="20%" stop-color="#8A95A5" />
      <stop offset="40%" stop-color="#CFD6DF" />
      <stop offset="60%" stop-color="#FFFFFF" />
      <stop offset="80%" stop-color="#8A95A5" />
      <stop offset="100%" stop-color="#1F252C" />
    </linearGradient>

    <linearGradient id="chrome-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#D1D7E0" />
      <stop offset="50%" stop-color="#5C6673" />
      <stop offset="70%" stop-color="#EBEFF5" />
      <stop offset="100%" stop-color="#151A21" />
    </linearGradient>

    <linearGradient id="chrome-text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#E8ECF0" />
      <stop offset="50%" stop-color="#8C96A4" />
      <stop offset="75%" stop-color="#DCE2E9" />
      <stop offset="100%" stop-color="#555E6B" />
    </linearGradient>

    <!-- Glowing effect filters -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="boost" operator="over" />
    </filter>
  </defs>

  <!-- Soft background glow for dark theme -->
  <circle cx="60" cy="60" r="45" fill="#FFFFFF" opacity="0.06" filter="url(#soft-glow)" />

  <g transform="translate(10, 10)">
    <!-- 3D Ribbon Emblem (A) -->
    <!-- Left Pillar (Back Layer) -->
    <path d="M 32 85 C 32 85 45 42 55 25 C 62 13 70 12 75 22 C 80 32 85 48 85 48 C 85 48 76 68 70 78 C 65 85 58 87 50 82 Z" fill="url(#chrome-grad-1)" opacity="0.9" />
    
    <!-- Outer Curved Ribbon Loop (Front Layer) -->
    <path d="M 22 82 C 12 60 22 30 45 15 C 65 2 82 8 92 25 C 102 42 101 70 85 85 C 75 95 62 98 48 90 C 44 87 48 80 54 82 C 64 85 74 81 81 74 C 91 64 92 42 84 28 C 76 15 63 11 48 21 C 32 32 23 55 30 74 C 32 80 24 84 22 82 Z" fill="url(#chrome-grad-2)" filter="url(#soft-glow)" />
    
    <!-- Central Ribbon Fold (Overlapping bar of A) -->
    <path d="M 33 62 C 37 58 48 55 60 57 C 72 59 81 65 85 71 C 88 77 82 81 77 78 C 72 75 66 70 56 68 C 46 66 38 68 35 71 C 31 75 29 66 33 62 Z" fill="url(#chrome-grad-1)" />
  </g>

  <!-- Divider Line -->
  <line x1="130" y1="25" x2="130" y2="95" stroke="#2B2B2B" stroke-width="1.5" />

  <!-- Logo Typography -->
  <!-- AWENUE Text -->
  <text x="155" y="65" font-family="'Space Grotesk', 'Montserrat', 'Helvetica', sans-serif" font-weight="700" font-size="44" fill="url(#chrome-text-grad)" letter-spacing="12" filter="url(#soft-glow)">AWENUE</text>
  
  <!-- Subtitle Tagline -->
  <text x="157" y="88" font-family="'Inter', 'Satoshi', 'Arial', sans-serif" font-weight="400" font-size="10.5" fill="#8B8B8B" letter-spacing="4.8">GLOBAL SOFTWARE SOLUTIONS</text>
</svg>
