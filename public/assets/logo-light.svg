<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="100%" height="100%">
  <defs>
    <!-- Chrome / Silver Gradients optimized for light background -->
    <linearGradient id="chrome-grad-light-1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E1217" />
      <stop offset="25%" stop-color="#4A525D" />
      <stop offset="50%" stop-color="#808C9E" />
      <stop offset="75%" stop-color="#A5B3C6" />
      <stop offset="100%" stop-color="#2D333D" />
    </linearGradient>

    <linearGradient id="chrome-grad-light-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8592A3" />
      <stop offset="30%" stop-color="#3B434C" />
      <stop offset="60%" stop-color="#181D24" />
      <stop offset="85%" stop-color="#7B8899" />
      <stop offset="100%" stop-color="#080B0E" />
    </linearGradient>

    <linearGradient id="chrome-text-grad-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0C0E12" />
      <stop offset="30%" stop-color="#21262E" />
      <stop offset="60%" stop-color="#4F5968" />
      <stop offset="90%" stop-color="#14171D" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Glowing effect filters (dark/soft shadow instead of glow) -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.12" />
    </filter>
  </defs>

  <g transform="translate(10, 10)" filter="url(#soft-shadow)">
    <!-- 3D Ribbon Emblem (A) -->
    <!-- Left Pillar (Back Layer) -->
    <path d="M 32 85 C 32 85 45 42 55 25 C 62 13 70 12 75 22 C 80 32 85 48 85 48 C 85 48 76 68 70 78 C 65 85 58 87 50 82 Z" fill="url(#chrome-grad-light-1)" />
    
    <!-- Outer Curved Ribbon Loop (Front Layer) -->
    <path d="M 22 82 C 12 60 22 30 45 15 C 65 2 82 8 92 25 C 102 42 101 70 85 85 C 75 95 62 98 48 90 C 44 87 48 80 54 82 C 64 85 74 81 81 74 C 91 64 92 42 84 28 C 76 15 63 11 48 21 C 32 32 23 55 30 74 C 32 80 24 84 22 82 Z" fill="url(#chrome-grad-light-2)" />
    
    <!-- Central Ribbon Fold (Overlapping bar of A) -->
    <path d="M 33 62 C 37 58 48 55 60 57 C 72 59 81 65 85 71 C 88 77 82 81 77 78 C 72 75 66 70 56 68 C 46 66 38 68 35 71 C 31 75 29 66 33 62 Z" fill="url(#chrome-grad-light-1)" />
  </g>

  <!-- Divider Line (Darker) -->
  <line x1="130" y1="25" x2="130" y2="95" stroke="#D1D5DB" stroke-width="1.5" />

  <!-- Logo Typography -->
  <!-- AWENUE Text -->
  <text x="155" y="65" font-family="'Space Grotesk', 'Montserrat', 'Helvetica', sans-serif" font-weight="700" font-size="44" fill="url(#chrome-text-grad-light)" letter-spacing="12">AWENUE</text>
  
  <!-- Subtitle Tagline -->
  <text x="157" y="88" font-family="'Inter', 'Satoshi', 'Arial', sans-serif" font-weight="500" font-size="10.5" fill="#6B7280" letter-spacing="4.8">GLOBAL SOFTWARE SOLUTIONS</text>
</svg>
